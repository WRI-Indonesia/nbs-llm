name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:

  build:

    runs-on: ubuntu-latest
    environment: production

    env:
      DOCKER_BUILDKIT: 1

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Debug secret visibility
      run: echo "Open AI key length: ${#OPENAI_API_KEY}"
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    - name: Build and push image to GHCR
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        IMAGE_ID=ghcr.io/wri-indonesia/nbs-llm
        VERSION=${GITHUB_SHA::7}
        echo "🔧 Building $IMAGE_ID:latest and $IMAGE_ID:$VERSION"
        docker build \
          --secret id=openai_api_key,env=OPENAI_API_KEY \
          -t $IMAGE_ID:latest -t $IMAGE_ID:$VERSION .
        echo "🚀 Pushing to GHCR..."
        docker push $IMAGE_ID:latest
        docker push $IMAGE_ID:$VERSION
      
    - name: Deploy to VM
      if: github.ref == 'refs/heads/main'
      uses: appleboy/ssh-action@v1.2.0
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USER }}
        key: ${{ secrets.VM_SSH_KEY }}
        script: |
          echo "Updating container on llm.wri-indonesia.or.id..."
          cd /home/${{ secrets.VM_USER }}/docker/nbs-llm

          echo "🧩 Writing .env.production..."
          cat > .env.production <<EOF
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          NODE_ENV=production
          NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
          EMBED_MODEL_NAME=${{ secrets.EMBED_MODEL_NAME }}
          CHAT_MODEL=${{ secrets.CHAT_MODEL }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}
          EOF

          docker compose pull nbs-llm
          docker compose up -d nbs-llm
          docker image prune -f